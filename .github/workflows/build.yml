name: Build OpenCore

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  schedule:
    - cron: '0 0 * * 0'   # 每周自动构建，确保镜像更新
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          echo "y" | sdkmanager "ndk;25.1.8937393"

      - name: Build with Gradle
        run: gradle assembleRelease

      - name: Prepare Magisk module
        run: |
          mkdir -p magisk_ready/system/lib64
          cp app/build/intermediates/cmake/release/obj/arm64-v8a/libnative-lib.so magisk_ready/system/lib64/
          cp -r magisk_module/* magisk_ready/
          cd magisk_ready && zip -r ../OpenCore-Magisk.zip . && cd ..

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OpenCore-Artifacts
          path: |
            app/build/outputs/apk/release/*.apk
            OpenCore-Magisk.zip

      - name: Create Release and upload assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            OpenCore-Magisk.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
